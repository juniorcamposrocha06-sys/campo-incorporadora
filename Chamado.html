<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solicitar Chamado - Campo Incorporadora</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f5f5;
            padding: 20px;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .header {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .header img {
            height: 60px;
            margin-bottom: 20px;
        }
        
        h1 {
            color: #094752;
            font-size: 24px;
            margin-bottom: 10px;
        }
        
        .subtitle {
            color: #666;
            font-size: 14px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            color: #333;
            font-weight: 500;
            margin-bottom: 8px;
            font-size: 14px;
        }
        
        label .required {
            color: #e74c3c;
        }
        
        input[type="text"],
        input[type="email"],
        input[type="tel"],
        textarea,
        select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-family: inherit;
            font-size: 14px;
        }
        
        textarea {
            resize: vertical;
            min-height: 80px;
        }
        
        input[type="text"]:focus,
        input[type="email"]:focus,
        input[type="tel"]:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: #094752;
            box-shadow: 0 0 0 3px rgba(9,71,82,0.1);
        }
        
        .urgency-selector {
            display: flex;
            gap: 12px;
            margin-top: 8px;
        }
        
        .urgency-btn {
            flex: 1;
            padding: 12px;
            border: 2px solid #ddd;
            background: white;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.2s;
        }
        
        .urgency-btn.baixa {
            color: #27ae60;
        }
        .urgency-btn.baixa.selected {
            border-color: #27ae60;
            background-color: #d5f4e6;
        }
        
        .urgency-btn.normal {
            color: #f39c12;
        }
        .urgency-btn.normal.selected {
            border-color: #f39c12;
            background-color: #fef5e7;
        }
        
        .urgency-btn.alta {
            color: #e67e22;
        }
        .urgency-btn.alta.selected {
            border-color: #e67e22;
            background-color: #fdebd0;
        }
        
        .urgency-btn.urgente {
            color: #e74c3c;
        }
        .urgency-btn.urgente.selected {
            border-color: #e74c3c;
            background-color: #fadbd8;
        }
        
        .urgency-btn:hover {
            border-color: #094752;
        }
        
        .submit-btn {
            width: 100%;
            padding: 12px;
            background-color: #094752;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        
        .submit-btn:hover:not(:disabled) {
            background-color: #063341;
        }
        
        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .submit-btn:active:not(:disabled) {
            transform: scale(0.98);
        }
        
        .success-popup {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            text-align: center;
            z-index: 1000;
            max-width: 400px;
        }
        
        .success-popup.active {
            display: block;
        }
        
        .success-popup h2 {
            color: #27ae60;
            margin-bottom: 15px;
        }
        
        .protocol-number {
            font-size: 24px;
            font-weight: bold;
            color: #094752;
            padding: 15px;
            background-color: #f0f0f0;
            border-radius: 4px;
            margin: 15px 0;
            word-break: break-all;
        }
        
        .copy-btn {
            background-color: #23B368;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            margin-top: 10px;
        }
        
        .copy-btn:hover {
            background-color: #1a9655;
        }
        
        .overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 999;
        }
        
        .overlay.active {
            display: block;
        }
        
        .error-popup {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            z-index: 1000;
            max-width: 400px;
        }
        
        .error-popup.active {
            display: block;
        }
        
        .error-popup h2 {
            color: #e74c3c;
            margin-bottom: 15px;
        }
        
        .error-popup p {
            color: #666;
            margin-bottom: 15px;
        }
        
        .close-btn {
            background-color: #094752;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
        }
        
        .close-btn:hover {
            background-color: #063341;
        }

        select:disabled {
            background-color: #f5f5f5;
            color: #999;
        }

        .hidden-field {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <img src="https://campoincorporadora.com.br/wp-content/uploads/2026/03/logo_white.svg" alt="Campo Incorporadora" onerror="this.style.display='none'" />
            <h1>Solicitar Chamado</h1>
            <p class="subtitle">Preencha o formulário para solicitar manutenção</p>
        </div>
        
        <form id="chamadoForm">
            <div class="form-group">
                <label for="nome">Seu Nome <span class="required">*</span></label>
                <input type="text" id="nome" name="nome" placeholder="Seu nome completo" required />
            </div>
            
            <div class="form-group">
                <label for="local">Local de Atendimento <span class="required">*</span></label>
                <select id="local" name="local" required>
                    <option value="">-- Selecione uma unidade --</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="ambiente">Ambiente / Sala <span class="required">*</span></label>
                <select id="ambiente" name="ambiente" required disabled>
                    <option value="">-- Selecione um ambiente --</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="descricao">Descrição do Problema <span class="required">*</span></label>
                <textarea id="descricao" name="descricao" placeholder="Descreva o problema de forma clara e detalhada" required></textarea>
            </div>
            
            <div class="form-group">
                <label>Nível de Urgência <span class="required">*</span></label>
                <div class="urgency-selector">
                    <button type="button" class="urgency-btn baixa" data-urgencia="Baixa">🟢 Baixa</button>
                    <button type="button" class="urgency-btn normal" data-urgencia="Normal">🟡 Normal</button>
                    <button type="button" class="urgency-btn alta" data-urgencia="Alta">🟠 Alta</button>
                    <button type="button" class="urgency-btn urgente" data-urgencia="Urgência">🔴 Urgente</button>
                </div>
                <input type="hidden" id="urgencia" name="urgencia" value="" required />
            </div>
            
            <button type="submit" class="submit-btn">Enviar Solicitação</button>
        </form>
    </div>
    
    <div class="overlay" id="overlay"></div>
    
    <div class="success-popup" id="successPopup">
        <h2>✓ Chamado Criado com Sucesso!</h2>
        <p>Seu protocolo é:</p>
        <div class="protocol-number" id="protocolNumber"></div>
        <p style="color: #666; font-size: 13px;">Guarde este número para acompanhar sua solicitação.</p>
        <button class="copy-btn" onclick="copyProtocol()">Copiar Protocolo</button>
        <button class="close-btn" onclick="closePopup()">Fechar</button>
    </div>
    
    <div class="error-popup" id="errorPopup">
        <h2>✗ Erro ao Enviar</h2>
        <p id="errorMessage"></p>
        <button class="close-btn" onclick="closeErrorPopup()">Tentar Novamente</button>
    </div>

    <script>
        // Token do Airtable com permissões mínimas
        const AIRTABLE_TOKEN = 'pat8GZr4SYM6RHLVd/3c78f2f6ae1fc3bb4fda5f2f1e9c8b7a6d5e4f3';
        const BASE_ID = 'app6FRO94lCtpAfXW';
        
        // IDs das tabelas
        const UNIDADES_TABLE = 'tblQIiulLhGvSlc5j';
        const ANDARES_TABLE = 'tblnaqWSeDDKYQhcW';
        const AMBIENTES_TABLE = 'tbljTc0rmF8RiOJkr';
        const CHAMADOS_TABLE = 'tblNNI1ODUUncxPM1';
        
        // IDs dos campos na tabela Unidades
        const UNIDADE_NOME_FIELD = 'fldSpPHD00EHNgUM4';
        
        // IDs dos campos na tabela Andares
        const ANDAR_NOME_FIELD = 'fldguFiqTGr240sYn';
        const ANDAR_UNIDADE_FIELD = 'fldsaELThlLSDp3bg';
        const ANDAR_AMBIENTES_FIELD = 'fldpudIqEfDyn6rUn';
        
        // IDs dos campos na tabela Ambientes
        const AMBIENTE_NOME_FIELD = 'fld3HDrdaC0r4JZGZ';
        const AMBIENTE_ANDAR_FIELD = 'fldkiHPbhBfM0CFod';
        
        // IDs dos campos na tabela Chamados
        const CHAMADOS_NOME_FIELD = 'fldL7WPgIYU6SStqL';
        const CHAMADOS_UNIDADE_FIELD = 'fldBog4zPEXyV6cxY';
        const CHAMADOS_AMBIENTE_FIELD = 'fldcR1fX2rIaLhCsy'; // Precisamos descobrir qual é
        const CHAMADOS_DESCRICAO_FIELD = 'fld8iYFondncRb894';
        const CHAMADOS_URGENCIA_FIELD = 'fldZIAHD1iMawqRYF';
        const CHAMADOS_PROTOCOLO_FIELD = 'fldeIb19xLleqv7sm'; // Campo para armazenar protocolo
        
        let unidades = [];
        let andares = [];
        let ambientes = [];
        let selectedUrgencia = '';
        
        // Carregar todas as tabelas ao iniciar
        async function loadData() {
            try {
                // Carregar Unidades
                const unidadesRes = await fetch(
                    `https://api.airtable.com/v0/${BASE_ID}/${UNIDADES_TABLE}`,
                    {
                        headers: { 'Authorization': `Bearer ${AIRTABLE_TOKEN}` }
                    }
                );
                unidades = (await unidadesRes.json()).records || [];
                
                // Carregar Andares
                const andaresRes = await fetch(
                    `https://api.airtable.com/v0/${BASE_ID}/${ANDARES_TABLE}`,
                    {
                        headers: { 'Authorization': `Bearer ${AIRTABLE_TOKEN}` }
                    }
                );
                andares = (await andaresRes.json()).records || [];
                
                // Carregar Ambientes
                const ambientesRes = await fetch(
                    `https://api.airtable.com/v0/${BASE_ID}/${AMBIENTES_TABLE}`,
                    {
                        headers: { 'Authorization': `Bearer ${AIRTABLE_TOKEN}` }
                    }
                );
                ambientes = (await ambientesRes.json()).records || [];
                
                // Preencher dropdown de unidades
                const localSelect = document.getElementById('local');
                localSelect.innerHTML = '<option value="">-- Selecione uma unidade --</option>';
                
                unidades.forEach(record => {
                    const option = document.createElement('option');
                    option.value = record.id;
                    option.textContent = record.fields[UNIDADE_NOME_FIELD] || 'Sem nome';
                    localSelect.appendChild(option);
                });
                
            } catch (error) {
                console.error('Erro ao carregar dados:', error);
            }
        }
        
        // Atualizar dropdown de ambientes quando unidade é selecionada
        document.getElementById('local').addEventListener('change', function() {
            const unidadeId = this.value;
            const ambienteSelect = document.getElementById('ambiente');
            
            if (!unidadeId) {
                ambienteSelect.disabled = true;
                ambienteSelect.innerHTML = '<option value="">-- Selecione um ambiente --</option>';
                return;
            }
            
            // Encontrar andares da unidade selecionada
            const andaresUnidade = andares.filter(andar => {
                const unidadesAndar = andar.fields[ANDAR_UNIDADE_FIELD] || [];
                return unidadesAndar.some(u => u.id === unidadeId);
            });
            
            // Coletar todos os ambientes desses andares
            const ambientesFiltrados = [];
            andaresUnidade.forEach(andar => {
                const idsAmbientes = andar.fields[ANDAR_AMBIENTES_FIELD] || [];
                idsAmbientes.forEach(ambId => {
                    const amb = ambientes.find(a => a.id === ambId.id);
                    if (amb) ambientesFiltrados.push(amb);
                });
            });
            
            // Atualizar select
            ambienteSelect.innerHTML = '<option value="">-- Selecione um ambiente --</option>';
            ambienteSelect.disabled = false;
            
            if (ambientesFiltrados.length === 0) {
                const option = document.createElement('option');
                option.value = '';
                option.textContent = '-- nenhum ambiente cadastrado --';
                option.disabled = true;
                ambienteSelect.appendChild(option);
                return;
            }
            
            // Agrupar ambientes por andar e adicionar ao select
            andaresUnidade.forEach(andar => {
                const nomeAndar = andar.fields[ANDAR_NOME_FIELD] || 'Sem nome';
                const idsAmbientes = andar.fields[ANDAR_AMBIENTES_FIELD] || [];
                
                const optgroup = document.createElement('optgroup');
                optgroup.label = nomeAndar;
                
                idsAmbientes.forEach(ambId => {
                    const amb = ambientes.find(a => a.id === ambId.id);
                    if (amb) {
                        const option = document.createElement('option');
                        option.value = amb.id;
                        let nomeAmbiente = amb.fields[AMBIENTE_NOME_FIELD] || 'Sem nome';
                        // Remover prefixos como [Interno], [Externo], [Estrutural]
                        nomeAmbiente = nomeAmbiente.replace(/^\[.*?\]\s*/, '');
                        option.textContent = nomeAmbiente;
                        optgroup.appendChild(option);
                    }
                });
                
                if (optgroup.children.length > 0) {
                    ambienteSelect.appendChild(optgroup);
                }
            });
        });
        
        // Seletor de urgência
        document.querySelectorAll('.urgency-btn').forEach(btn => {
            btn.addEventListener('click', function(e) {
                e.preventDefault();
                document.querySelectorAll('.urgency-btn').forEach(b => b.classList.remove('selected'));
                this.classList.add('selected');
                selectedUrgencia = this.dataset.urgencia;
                document.getElementById('urgencia').value = selectedUrgencia;
            });
        });
        
        // Gerar número de protocolo
        function generateProtocol() {
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            
            return `CH-${year}${month}${day}-${hours}${minutes}`;
        }
        
        // Enviar formulário
        document.getElementById('chamadoForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const submitBtn = document.querySelector('.submit-btn');
            submitBtn.disabled = true;
            
            try {
                const protocol = generateProtocol();
                const nome = document.getElementById('nome').value;
                const unidadeId = document.getElementById('local').value;
                const ambienteId = document.getElementById('ambiente').value;
                const descricao = document.getElementById('descricao').value;
                const urgencia = document.getElementById('urgencia').value;
                
                // Criar registro no Airtable
                const response = await fetch(
                    `https://api.airtable.com/v0/${BASE_ID}/${CHAMADOS_TABLE}`,
                    {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bearer ${AIRTABLE_TOKEN}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            records: [{
                                fields: {
                                    [CHAMADOS_NOME_FIELD]: nome,
                                    [CHAMADOS_UNIDADE_FIELD]: [unidadeId],
                                    [CHAMADOS_DESCRICAO_FIELD]: descricao,
                                    [CHAMADOS_URGENCIA_FIELD]: urgencia,
                                    [CHAMADOS_PROTOCOLO_FIELD]: protocol
                                }
                            }]
                        })
                    }
                );
                
                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.error?.message || 'Erro ao enviar');
                }
                
                // Sucesso!
                document.getElementById('protocolNumber').textContent = protocol;
                document.getElementById('overlay').classList.add('active');
                document.getElementById('successPopup').classList.add('active');
                document.getElementById('chamadoForm').reset();
                document.getElementById('urgencia').value = '';
                document.querySelectorAll('.urgency-btn').forEach(b => b.classList.remove('selected'));
                document.getElementById('ambiente').disabled = true;
                
            } catch (error) {
                console.error('Erro:', error);
                document.getElementById('errorMessage').textContent = error.message || 'Erro ao enviar. Tente novamente.';
                document.getElementById('overlay').classList.add('active');
                document.getElementById('errorPopup').classList.add('active');
            } finally {
                submitBtn.disabled = false;
            }
        });
        
        function copyProtocol() {
            const protocol = document.getElementById('protocolNumber').textContent;
            navigator.clipboard.writeText(protocol);
            alert('Protocolo copiado para a área de transferência!');
        }
        
        function closePopup() {
            document.getElementById('overlay').classList.remove('active');
            document.getElementById('successPopup').classList.remove('active');
        }
        
        function closeErrorPopup() {
            document.getElementById('overlay').classList.remove('active');
            document.getElementById('errorPopup').classList.remove('active');
        }
        
        // Carregar dados ao iniciar
        loadData();
    </script>
</body>
</html>
